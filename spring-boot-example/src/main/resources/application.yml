spring:
  application:
    name: LangChain4j Spring Boot Example
  profiles:
    active: default

# 强制使用 UTF-8 编码处理 HTTP 请求和响应
server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

logging:
  level:
    dev.langchain4j: DEBUG
  charset:
    console: UTF-8 # 设置控制台日志输出编码为 UTF-8

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0

