      - 急救
      - 求救
    phrases:
      - 请帮我拨打120
      - 请问医院在哪里
      - 有人受伤了
      - 请帮帮我
      - 请问警察局在哪里
      - 我的东西丢了
      - 请问火警电话是多少
      - 请救救我
      - 请问有紧急出口吗
      - 有人晕倒了
  - sceneId: 9
    scene: 沙滩或池畔
    pair1:
      - 您心里有没有某个具体的情况呢？如果有，随时可以提出来。
      - 请提供您参加的活动信息
    pair2:
      - 目前，能否请您向我介绍一下您即将参加的当地活动或节日的背景信息，比如文化节、美食节或者音乐节之类的。请提供相关背景信息。
      - 请描述一下你脑海中的情形。
    intentions:
      - 游泳戏水
      - 晒日光浴
      - 沙滩运动
    phrases:
      - 快看！那边的浪花特别大
      - 记得涂好防晒霜，这儿的紫外线非常强
      - 这片沙滩的沙子真细，踩上去像踩在棉花上一样。
      - 咱们在沙滩上打场排球怎么样
      - 远处的帆船看起来真漂亮
      - 这里的海水真清澈，都能看见鱼了
      - 咱们去找些贝壳吧
      - 日落时分在沙滩散步一定很浪漫
      - 听说这里的海鲜很新鲜，咱们去尝尝
      - 涨潮了，咱们往岸边走吧
