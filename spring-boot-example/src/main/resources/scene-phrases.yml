defaultPhrases:
  - 您能为我提供我可以在{{scene}}使用的10个常用短语吗?
  - 太棒了！这里有10个关于[{{scene}}]的常用短语，附带{{targetLanguageName}}翻译：
scenes:
  - sceneId: 1
    scene: 餐厅
    pair1:
      - 目前，您最想了解什么？比如查看今日推荐、查询优惠套餐、呼叫买单，或者呼叫服务员点餐，都可以随意问。
      - 请描述一下你脑海中的情形。
    intentions:
      - 用餐
      - 点餐
      - 结账
    phrases:
      - 请问有预订吗
      - 请给我们一张桌子，两位
      - 请把菜单拿给我们看看
      - 请问有什么招牌菜推荐吗
      - 我想点这个，还有这个
      - 请给我一杯水，谢谢
      - 买单 please
      - 可以用信用卡支付吗
      - 请给我们打包
      - 味道很好，谢谢
  - sceneId: 2
    scene: 酒店
    pair1:
      - 目前，您心里有没有具体的想要了解的情况呢？比如确认房间号、预约送机用车，或者寄存行李等，都可以直接询问。
      - 请描述一下你脑海中的情形。
    intentions:
      - 入住
      - 退房
      - 客房服务
    phrases:
      - 您好，我有预订
      - 请问还有空房间吗
      - 请给我看一下身份证
      - 早餐几点开始
      - 请给我一把房间钥匙
      - 可以帮我把行李拿到房间吗
      - 请问客房服务怎么叫
      - 退房时间是几点
      - 请帮我开发票
      - 可以寄存行李吗
  - sceneId: 3
    scene: 机场
    pair1:
      - 目前，您最想了解什么？比如查询航班状态、确认登机口位置、办理托运，或者咨询机场免税店，都可以随意问。
      - 请描述一下你脑海中的情形。
    intentions:
