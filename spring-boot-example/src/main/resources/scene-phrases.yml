      - 告诉目的地
      - 付款
    phrases:
      - 请问出租车在哪里叫
      - 请送我去这个地址
      - 请问大概多少钱
      - 请打表计价可以吗
      - 麻烦开快一点，我有急事
      - 请在这里停一下
      - 请问可以支付宝支付吗
      - 请给我发票
      - 谢谢师傅
